    </div>
    <nav class="navbar-menu hoverclick">
        <ul class="hoverclick">
            <li class="hoverclick"><a href="index.html" class="hoverclick">HOME</a></li>

<script>
  // Hamburger toggle
  const hamburger = document.querySelector('.navbar-hamburger i');
  const menu = document.querySelector('.navbar-menu');

  document.querySelector('.navbar-hamburger').addEventListener('click', () => {
      menu.classList.toggle('active');
      hamburger.classList.toggle('fa-bars');
      hamburger.classList.toggle('fa-xmark');
  });
</script>
